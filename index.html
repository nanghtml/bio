<!DOCTYPE html>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            overflow-x: hidden;
            /* Khmer Style Background: Angkor Wat with Dark Overlay */
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.75), rgba(0, 0, 0, 0.95)), 
                        url('https://images.unsplash.com/photo-1544413660-299165566b1d?auto=format&fit=crop&w=2000&q=80') center/cover fixed no-repeat;
            min-height: 100vh;
            color: white;
        }

        /* Ultimate Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Profile Glow - Khmer Colors (Red, Blue, Gold) */
        .profile-glow {
            position: relative;
        }
        .profile-glow::before {
            content: "";
            position: absolute;
            inset: -3px; 
            background: linear-gradient(45deg, #ef4444, #3b82f6, #f59e0b);
            border-radius: 50%;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.8;
            animation: spin 6s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { display: none; }

        /* Social Buttons */
        .social-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .social-glass:hover {
            transform: translateY(-4px) scale(1.08);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); /* Slight gold shadow */
        }

        /* Gradient Buttons */
        .btn-gradient-aba { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .btn-gradient-ac { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); }
        .btn-gradient-wing { background: linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%); color: #000; }
        
        .btn-action {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-action:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }
        .btn-action::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.3), rgba(255,255,255,0));
            transform: skewX(-25deg);
            transition: all 0.75s ease;
        }
        .btn-action:hover::after { left: 200%; }

    </style>
</head>

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">

                <h3 id="qrTitle" class="font-bold text-base text-white ml-2 flex items-center gap-2">
                    <i class="fas fa-qrcode text-amber-400"></i> QR Code
                </h3>

                    <div id="qrLoading" class="absolute inset-0 flex flex-col items-center justify-center text-blue-500 bg-white/80 backdrop-blur-sm z-20">

                    </div>
                    
                    <img id="qrImage" src="" alt="QR Code" class="w-full h-full object-contain rounded-lg relative z-10" onload="document.getElementById('qrLoading').style.display='none'">
                </div>
            </div>

                    <span class="text-[9px] font-bold bg-white/20 text-white border border-white/30 px-2.5 py-0.5 rounded-full uppercase">KHR</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openQR(imgSrc, bankName) {
            const modal = document.getElementById('qrModal');
            const backdrop = document.getElementById('qrBackdrop');
            const modalContent = document.getElementById('qrModalContent');
            const img = document.getElementById('qrImage');
            const title = document.getElementById('qrTitle');
            const loading = document.getElementById('qrLoading');
            
            modal.classList.remove('hidden');
            
            title.innerHTML = `<i class="fas fa-qrcode text-amber-400 mr-2"></i> ${bankName}`;
            loading.style.display = 'flex';
            img.src = imgSrc;
            
            requestAnimationFrame(() => {
                backdrop.classList.remove('opacity-0');
                backdrop.classList.add('opacity-100');
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeQR() {
            const modal = document.getElementById('qrModal');
            const backdrop = document.getElementById('qrBackdrop');
            const modalContent = document.getElementById('qrModalContent');
            
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('qrImage').src = "";
            }, 300);
        }
    </script>
</body>
