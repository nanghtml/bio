    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Animated Gradient Background */
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: linear-gradient(-45deg, #4158D0, #C850C0, #FFCC70, #00DBDE);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ultimate Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Profile Glow */
        .profile-glow {
            position: relative;
        }
        .profile-glow::before {
            content: "";
            position: absolute;
            inset: -5px;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffcc);
            border-radius: 50%;
            z-index: -1;
            filter: blur(15px);
            opacity: 0.8;
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { display: none; }

        /* Social Buttons */
        .social-glass {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .social-glass:hover {
            transform: translateY(-5px) scale(1.1);
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* Gradient Buttons */
        .btn-gradient-aba { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .btn-gradient-ac { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); }
        .btn-gradient-wing { background: linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%); color: #000; }
        
        .btn-action {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-action:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }
        .btn-action::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.3), rgba(255,255,255,0));
            transform: skewX(-25deg);
            transition: all 0.75s ease;
        }
        .btn-action:hover::after { left: 200%; }

    </style>
</head>

    <!-- QR Code Modal (Glassmorphism Style) -->

                </h3>

                    <div id="qrLoading" class="absolute inset-0 flex flex-col items-center justify-center text-blue-500 bg-white/80 backdrop-blur-sm z-20">

                    <span class="text-[10px] font-bold bg-white/20 text-white border border-white/30 px-3 py-1 rounded-full uppercase">KHR</span>
                </div>
            </div>

    <script>
        function openQR(imgSrc, bankName) {
            const modal = document.getElementById('qrModal');
            const backdrop = document.getElementById('qrBackdrop');
            const modalContent = document.getElementById('qrModalContent');
            const img = document.getElementById('qrImage');
            const title = document.getElementById('qrTitle');
            const loading = document.getElementById('qrLoading');
            
            modal.classList.remove('hidden');
            
            title.innerHTML = `<i class="fas fa-qrcode text-yellow-300 mr-2"></i> ${bankName}`;
            loading.style.display = 'flex';
            img.src = imgSrc;
            
            requestAnimationFrame(() => {
                backdrop.classList.remove('opacity-0');
                backdrop.classList.add('opacity-100');
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeQR() {
            const modal = document.getElementById('qrModal');
            const backdrop = document.getElementById('qrBackdrop');
            const modalContent = document.getElementById('qrModalContent');
            
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('qrImage').src = "";
            }, 300);
        }
    </script>
</body>
