    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ពុម្ពអក្សរខ្មែរ */
        @import url('https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap');
        body {
            font-family: 'Battambang', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            overflow-x: hidden;
        }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        /* --------------------------------------
           Animation ភ្លើងរត់ (Animated Border)
        ----------------------------------------- */
        
        /* កាតធនាគារ (Card Border Animation) */
        .animated-border-box {
            position: relative;
            border-radius: 1rem; /* 16px */
            padding: 2px; /* កម្រាស់នៃបន្ទាត់ភ្លើង */
            overflow: hidden;
        }

        .animated-border-box::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* ពណ៌ភ្លើងរត់ (ប្រើ Gradient) */
            background: conic-gradient(
                transparent, 
                transparent, 
                transparent, 
                #3b82f6, /* Blue 500 */
                #10b981, /* Emerald 500 */
                #3b82f6
            );
            animation: rotate 4s linear infinite;
            z-index: 1;
        }

        .animated-border-box::after {
            content: "";
            position: absolute;
            inset: 2px; /* ត្រូវតែស្មើនឹង padding ខាងលើ ដើម្បីបិទបាំងកណ្តាល */
            background: #1e293b; /* ពណ៌ផ្ទៃខាងក្នុងនៃកាត */
            border-radius: calc(1rem - 2px);
            z-index: 2;
        }
        
        /* ខ្លឹមសារខាងក្នុងកាតត្រូវនៅពីលើ (z-index ខ្ពស់ជាង) */
        .card-content {
            position: relative;
            z-index: 10;
            background: transparent;
            padding: 1rem;
            border-radius: calc(1rem - 2px);
        }

        /* រូប Profile (Avatar Border Animation) */
        .avatar-border-box {
            position: relative;
            padding: 4px; /* កម្រាស់ភ្លើងរត់ជុំវិញរូប */
            border-radius: 50%;
            display: inline-block;
            overflow: hidden;
        }
        
        .avatar-border-box::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                #ec4899, /* Pink 500 */
                #8b5cf6, /* Violet 500 */
                #3b82f6, /* Blue 500 */
                #ec4899
            );
            animation: rotate 3s linear infinite;
            z-index: 1;
        }

        .avatar-img-container {
            position: relative;
            z-index: 10;
            border-radius: 50%;
            background-color: #0f172a;
            padding: 4px; /* គម្លាតរវាងរូបនិងភ្លើង */
        }

        /* ចលនាបង្វិល (Rotation Animation) */
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* -------------------------------------- */

        .hover-scale {
            transition: transform 0.2s ease-in-out;
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }
        
        /* លាក់ Scrollbar តែនៅអាចអូសបាន */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>

    <!-- Message Toast (សម្រាប់ការលោតប្រាប់) -->

    <!-- Scripts -->
    <script>
        // កំណត់ឆ្នាំស្វ័យប្រវត្តិ
        document.getElementById('year').textContent = new Date().getFullYear();

        const modal = document.getElementById('qrModal');
        const modalImg = document.getElementById('modalQRImage');
        const modalTitle = document.getElementById('modalTitle');
        const shareBtn = document.getElementById('shareBtn');
        
        let currentBankName = '';
        let currentQRUrl = '';

        // ត្រួតពិនិត្យមើលថាតើ Browser គាំទ្រ Web Share API ដែរឬទេ
        if (!navigator.share) {
            shareBtn.style.display = 'none';
            shareBtn.parentElement.classList.remove('grid-cols-2');
            shareBtn.parentElement.classList.add('grid-cols-1');
        }

        // អនុគមន៍បើកផ្ទាំង QR
        function openQRModal(bankName, qrUrl) {
            currentBankName = bankName;
            currentQRUrl = qrUrl;
            
            modalTitle.textContent = bankName + " QR";
            
            // បន្ថែមប៉ារ៉ាម៉ែត្រដើម្បីចៀសវាងបញ្ហា Cache នៅពេលទាញយករូបភាពពី Github
            modalImg.src = qrUrl + '?v=' + new Date().getTime();
            
            // បង្ហាញ Modal
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // ប្រើ Timeout ដើម្បីឲ្យ Animation ដំណើរការ
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
            }, 10);
        }

        // អនុគមន៍បិទផ្ទាំង QR
        function closeQRModal(e) {
            // ការពារកុំឲ្យបិទពេលចុចលើតួ Modal (លើកលែងតែចុចខាងក្រៅ ឬចុចប៊ូតុង)
            if(e && !e.target.classList.contains('bg-black/80') && !e.target.closest('button')) return; 
            
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // អនុគមន៍បង្ហាញសារ Toast
        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = message;
            
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        }

        // អនុគមន៍ទាញយក QR Code
        async function downloadQR() {
            try {
                showToast("កំពុងរៀបចំទាញយក...");
                
                const response = await fetch(currentQRUrl);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `QR_${currentBankName.replace(/\s+/g, '_')}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
                
                showToast("បានទាញយករួចរាល់!");
            } catch (error) {
                console.error("Error downloading:", error);
                
                const a = document.createElement('a');
                a.href = currentQRUrl;
                a.download = `QR_${currentBankName.replace(/\s+/g, '_')}.jpg`;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        // អនុគមន៍ចែករំលែក QR Code (Web Share API)
        async function shareQR() {
            try {
                try {
                    const response = await fetch(currentQRUrl);
                    const blob = await response.blob();
                    const file = new File([blob], `QR_${currentBankName.replace(/\s+/g, '_')}.jpg`, { type: blob.type });
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: `QR Code សម្រាប់ ${currentBankName} - Hun Samnang`,
                            text: `សូមស្កេន QR Code នេះសម្រាប់ការទូទាត់ទៅកាន់គណនី ${currentBankName} របស់ខ្ញុំ។`,
                            files: [file]
                        });
                        return;
                    }
                } catch (imgError) {
                    console.log("មិនអាច Share ជារូបភាពផ្ទាល់បានទេ នឹងប្តូរទៅ Share ជាតំណភ្ជាប់វិញ", imgError);
                }

                await navigator.share({
                    title: `QR Code សម្រាប់ ${currentBankName} - Hun Samnang`,
                    text: `នេះជាតំណភ្ជាប់សម្រាប់ស្កេន QR Code គណនី ${currentBankName} របស់ខ្ញុំ៖`,
                    url: currentQRUrl
                });
                
            } catch (error) {
                if (error.name !== 'AbortError') {
                    showToast("មានបញ្ហាក្នុងការចែករំលែក");
                    console.error('Error sharing:', error);
                }
            }
        }
    </script>
